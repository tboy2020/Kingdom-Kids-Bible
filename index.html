nto a cloud. The disciples stood there looking up with their mouths open!\n\nTwo angels appeared. \"Why are you standing here looking at the sky? Jesus has gone to heaven. One day He will come back in the same way you saw Him go.\"\n\nThe disciples went back to Jerusalem and prayed together. About one hundred and twenty of them waited faithfully.\n\nTen days passed. Then came the Jewish festival called Pentecost. Suddenly a sound like a mighty rushing wind filled the whole house! What looked like tongues of fire appeared and rested on each person!\n\nAnd they all began to speak in different languages — languages they had never learned!\n\nOutside, Jerusalem was full of people from many countries. They heard the noise and came running. They were amazed to hear the disciples speaking in their own languages!\n\n\"What does this mean?\" they asked.\n\nPeter stood up and told the crowd about Jesus. That day, three thousand people believed and were baptised. The church of Jesus had begun!","ref":"Acts 1:4–2:41"},{"id":47,"part":7,"partName":"The Early Church","title":"Paul's Amazing Change","emoji":"💡","color":"#3a2a1a","imageQuery":"Paul Damascus road light conversion Bible children illustration","text":"There was a man named Saul who hated the followers of Jesus with a passion.\n\nSaul thought Christians were dangerous. He tracked them down, arrested them, and had them thrown in prison. He was even there watching when a man named Stephen was stoned to death — the very first person killed for following Jesus.\n\nSaul was so determined to stop the Christians that he got special letters from the high priest allowing him to go to the city of Damascus and arrest any Christians he found there.\n\nSaul set out on the road to Damascus, breathing fire and threats against the disciples of Jesus.\n\nBut then — a flash of light from heaven! It was brighter than the noon sun. Saul fell to the ground!\n\nA voice spoke: \"Saul! Saul! Why are you persecuting me?\"\n\n\"Who are you, Lord?\" Saul gasped.\n\n\"I am Jesus — the one you are persecuting!\"\n\nSaul was trembling. \"Lord, what do you want me to do?\"\n\n\"Get up and go into the city. You will be told what to do.\"\n\nSaul stood up — but he was blind! His companions led him by the hand into Damascus.\n\nFor three days, Saul sat blind, not eating or drinking, just praying.\n\nThen God sent a man named Ananias to pray for Saul. His sight returned! He was baptised immediately.\n\nThe man who had been the greatest enemy of the church became its greatest champion! He was renamed Paul, and he took the story of Jesus to the whole world.","ref":"Acts 9:1–22"},{"id":48,"part":8,"partName":"God's Great Promises","title":"A New World Coming","emoji":"🌍","color":"#1a2a3a","imageQuery":"New earth paradise garden children people God Bible illustration","text":"The Bible tells us that God has a wonderful plan for this earth. A truly wonderful plan.\n\nOne day, all the sadness in the world will be gone. No more sickness. No more death. No more crying. No more pain.\n\nDo you ever see something sad — an animal that is hurt, or someone who is sick, or someone crying? One day all of that will be fixed forever.\n\nGod says, \"I will make everything new!\"\n\nThe Bible describes this new world as paradise. Gardens filled with fruit and flowers. Clear rivers running through beautiful fields. Animals and people living in peace together — just like in the original Garden of Eden.\n\nLions and lambs lying down together. Children playing safely. No one afraid of anything.\n\nAnd best of all — God Himself will live with His people. No more separation between heaven and earth. God's home will be right here with us!\n\n\"He will wipe every tear from their eyes,\" the Bible promises. \"Death shall be no more. Grief and crying and pain will be no more.\"\n\nThe people who love God and follow Jesus will live in this beautiful world forever and ever.\n\nHow long is forever? Close your eyes and think of the biggest number you can imagine. Keep going. And going. Forever is longer than that!\n\nGod wants YOU to be part of His wonderful forever family. All you need to do is love Him and follow Jesus with all your heart.","ref":"Revelation 21:1–5; Isaiah 65:17–25"}];

var PARTS = {};
STORIES.forEach(function(s) {

});

var currentStoryIdx = 0;
var isReadingAloud = false;
var synth = window.speechSynthesis;
var homeAudioPlaying = false;

// ── SPLASH ──
function buildSplashStars() {
  var c = document.getElementById('splashStars');
  for (var i = 0; i < 60; i++) {
    var s = document.createElement('div');
    s.className = 'splash-star';
    var sz = Math.random() * 3 + 1;
    s.style.cssText = 'width:'+sz+'px;height:'+sz+'px;left:'+Math.random()*100+'%;top:'+Math.random()*100+'%;--d:'+(2+Math.random()*4).toFixed(1)+'s;--dl:'+(Math.random()*4).toFixed(1)+'s;--op:'+(0.4+Math.random()*0.6).toFixed(2);
    c.appendChild(s);
  }
}

function enterKids() {
  if (synth) synth.cancel();
  document.getElementById('splash').classList.add('fade-out');
  setTimeout(function() { document.getElementById('splash').style.display = 'none'; }, 550);
  buildHome();
  setTimeout(playWelcome, 700);
}

// ── WELCOME AUDIO ──
function getKidsVoice() {
  var voices = synth ? synth.getVoices() : [];
  var preferred = ['Samantha', 'Karen', 'Moira', 'Tessa', 'Victoria', 'Allison'];
  for (var i = 0; i < preferred.length; i++) {
    for (var j = 0; j < voices.length; j++) {
      if (voices[j].name.indexOf(preferred[i]) >= 0) return voices[j];
    }
  }
  for (var j = 0; j < voices.length; j++) {
    if (voices[j].lang && voices[j].lang.indexOf('en') === 0) return voices[j];
  }
  return voices[0] || null;
}

function speakKids(text, onEnd, rate) {
  if (!synth) { if (onEnd) onEnd(); return; }
  synth.cancel();
  var utt = new SpeechSynthesisUtterance(text);
  utt.rate = rate || 0.88;
  utt.pitch = 1.1;
  utt.volume = 1.0;
  var voice = getKidsVoice();
  if (voice) utt.voice = voice;
  utt.onend = onEnd || null;
  utt.onerror = function() { if (onEnd) onEnd(); };
  synth.speak(utt);
}

function playWelcome() {
  speakKids(
    "Welcome to Bible Stories for Children! " +
    "Here you will find 48 amazing true stories from the Bible. " +
    "Stories about creation and floods, brave heroes and wise kings, " +
    "and the wonderful life of Jesus! " +
    "Tap any story to begin!",
    function() { homeAudioPlaying = false; updateTopBtn(); },
    0.88
  );
  homeAudioPlaying = true;
  updateTopBtn();
}

function toggleHomeAudio() {
  if (homeAudioPlaying && synth && synth.speaking) {
    synth.cancel();
    homeAudioPlaying = false;
    updateTopBtn();
  } else {
    playWelcome();
  }
}

function updateTopBtn() {
  var btn = document.getElementById('topAudioBtn');
  if (btn) {
    btn.textContent = homeAudioPlaying ? '⏸ Stop' : '🔊 Welcome';
    btn.className = homeAudioPlaying ? 'audio-btn playing' : 'audio-btn';
  }
}

// ── HOME ──
var openParts = {};

function buildHome() {
  var list = document.getElementById('partsList');
  list.innerHTML = '';
  Object.keys(PARTS).forEach(function(p) {
    var part = PARTS[p];
    var section = document.createElement('div');
    section.className = 'part-section';

    var header = document.createElement('div');
    header.className = 'part-header';
    header.innerHTML =
      '<div class="part-num">' + p + '</div>' +
      '<div class="part-name">' + part.name + '</div>' +
      '<div class="part-count">' + part.stories.length + ' stories</div>' +
      '<div class="part-arrow">›</div>';

    var grid = document.createElement('div');
    grid.className = 'story-grid';
    grid.id = 'part-grid-' + p;

    part.stories.forEach(function(story, idx) {
      var tile = document.createElement('div');
      tile.className = 'story-tile';
      tile.style.background = story.color;
      tile.innerHTML =
        '<div class="tile-emoji">' + story.emoji + '</div>' +
        '<div class="tile-num">Story ' + story.id + '</div>' +
        '<div class="tile-title">' + story.title + '</div>';
      tile.onclick = (function(s) { return function() { openStory(s); }; })(story);
      grid.appendChild(tile);
    });

    header.onclick = function() {
      var isOpen = grid.classList.contains('open');
      if (isOpen) {
        grid.classList.remove('open');
        header.classList.remove('open');
      } else {
        grid.classList.add('open');
        header.classList.add('open');
      }
    };

    section.appendChild(header);
    section.appendChild(grid);
    list.appendChild(section);
  });

  // Auto-open Part 1
  var firstGrid = document.getElementById('part-grid-1');
  if (firstGrid) {
    firstGrid.classList.add('open');
    var firstHeader = firstGrid.previousSibling;
    if (firstHeader) firstHeader.classList.add('open');
  }
}

// ── STORY READER ──
function openStory(story) {
  if (synth) synth.cancel();
  homeAudioPlaying = false;
  updateTopBtn();

  currentStoryIdx = STORIES.indexOf(story);
  renderReader();
  document.getElementById('reader').classList.add('active');
}

function closeReader() {
  if (synth) synth.cancel();
  isReadingAloud = false;
  updateReadBtn();
  document.getElementById('reader').classList.remove('active');
}

function renderReader() {
  var story = STORIES[currentStoryIdx];
  if (!story) return;

  var total = STORIES.length;
  document.getElementById('readerTitle').textContent = story.emoji + ' ' + story.title;
  document.getElementById('readerProg').textContent = story.id + ' / ' + total;
  document.getElementById('readerProgFill').style.width = Math.round((story.id/total)*100) + '%';
  document.getElementById('storyImageTitle').textContent = story.title;
  document.getElementById('storyImageEmoji').textContent = story.emoji;
  document.getElementById('storyEmoji').textContent = story.emoji;
  document.getElementById('storyRef').textContent = story.ref;

  // Render text paragraphs
  var paragraphs = story.text.split('\n\n').filter(function(p) { return p.trim(); });
  document.getElementById('storyText').innerHTML = paragraphs.map(function(p) {
    return '<p>' + p.trim() + '</p>';
  }).join('');

  // Load illustration via image search
  loadStoryImage(story);

  // Update background colour
  document.getElementById('reader').style.background = story.color;

  // Scroll to top
  document.getElementById('readerBody').scrollTop = 0;

  // Auto read aloud
  if (isReadingAloud) {
    setTimeout(function() { startReadAloud(story); }, 500);
  }
}

    45: "https://upload.wikimedia.org/wikipedia/commons/thumb/4/4c/Carl_Heinrich_Bloch_-_The_Resurrection.jpg/800px-Carl_Heinrich_Bloch_-_The_Resurrection.jpg",
    46: "https://upload.wikimedia.org/wikipedia/commons/thumb/3/3e/Jean_II_Restout_-_Pentec%C3%B4te.jpg/578px-Jean_II_Restout_-_Pentec%C3%B4te.jpg",
    47: "https://upload.wikimedia.org/wikipedia/commons/thumb/e/e5/Conversion_of_Paul_Schnorr_von_Carolsfeld.png/533px-Conversion_of_Paul_Schnorr_von_Carolsfeld.png",
    48: "https://upload.wikimedia.org/wikipedia/commons/thumb/f/fb/Thomas_Cole_-_The_Garden_of_Eden_-_Amon_Carter_Museum.jpg/800px-Thomas_Cole_-_The_Garden_of_Eden_-_Amon_Carter_Museum.jpg",
  };

  var imgUrl = IMAGE_URLS[story.id];
  if (!imgUrl) {
    placeholder.style.display = 'flex';
    return;
  }

  var img = wrap.querySelector('img');
  if (!img) {
    img = document.createElement('img');
    img.alt = story.title;
    wrap.insertBefore(img, placeholder);
  }

  placeholder.style.display = 'flex';
  img.style.display = 'none';
  document.getElementById('imgPlaceholder').querySelector('.img-placeholder-text').textContent = 'Loading illustration...';

  img.onload = function() {
    placeholder.style.display = 'none';
    img.style.display = 'block';
  };
  img.onerror = function() {
    placeholder.style.display = 'flex';
    var pt = document.getElementById('imgPlaceholderText'); if(pt) pt.textContent = story.title; document.getElementById('storyEmoji').textContent = story.emoji;
    img.style.display = 'none';
  };
  img.src = imgUrl;
}

function nextStory() {
  if (synth) synth.cancel();
  if (currentStoryIdx < STORIES.length - 1) {
    currentStoryIdx++;
    renderReader();
  } else {
    closeReader();
  }
}

function prevStory() {
  if (synth) synth.cancel();
  if (currentStoryIdx > 0) {
    currentStoryIdx--;
    renderReader();
  }
}

// ── READ ALOUD ──
function toggleReadAloud() {
  if (isReadingAloud && synth && synth.speaking) {
    synth.cancel();
    isReadingAloud = false;
    updateReadBtn();
  } else {
    isReadingAloud = true;
    updateReadBtn();
    startReadAloud(STORIES[currentStoryIdx]);
  }
}

function startReadAloud(story) {
  if (!synth || !isReadingAloud) return;
  var fullText = story.title + '. ' + story.text.replace(/\n\n/g, '. ') + '. From ' + story.ref + '.';
  speakKids(fullText, function() {
    isReadingAloud = false;
    updateReadBtn();
  }, 0.86);
}

function updateReadBtn() {
  var btn = document.getElementById('readAloudBtn');
  if (btn) {
    btn.textContent = isReadingAloud ? '⏸ Stop' : '🔊 Read';
    btn.className = isReadingAloud ? 'sf-read-btn reading' : 'sf-read-btn';
  }
}

// ── INIT ──
buildSplashStars();
if (synth && synth.onvoiceschanged !== undefined) {
  synth.onvoiceschanged = function() {};
}
</script>
</body>
</html>
